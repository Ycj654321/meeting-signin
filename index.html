<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>江南会议签到系统</title>
<script src="https://cdn.bootcdn.net/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{--c:#1a5cad;--cg:#2a7a3a;--cr:#c0392b;--cb:#2980b9;--co:#d35400;--cy:#b7950b;--cy2:#7d6608;--cl:#6c3483;--cy3:#1a5276;--cy4:#17202a;--c5:#566573;--c6:#7b241c;--c7:#1e8449;--c8:#1f618d;--c9:#7d6608;--c10:#512e5f;--c11:#0e6655;--c12:#6e2f1a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Microsoft YaHei','PingFang SC','Helvetica Neue',Helvetica,Arial,sans-serif;background:#eef2f7;color:#222;min-height:100vh}
.app{max-width:680px;margin:0 auto;padding:20px 16px 80px}
header{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:2px solid var(--c);margin-bottom:20px}
header h1{font-size:20px;color:var(--c)}
.hdr-op{display:flex;gap:8px}
.btn{background:var(--c);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:14px;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-o{background:#fff;color:var(--c);border:1.5px solid var(--c)}
.btn-g{background:var(--cg)}
.btn-r{background:var(--cr)}
.btn-b{background:var(--cb)}
.btn-y{background:var(--co)}
.btn-sub{font-size:12px;padding:5px 10px}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.card-title{font-size:15px;font-weight:600;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #eee;color:var(--c)}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat-box{background:var(--c);color:#fff;border-radius:10px;padding:14px 10px;text-align:center}
.stat-box.g{background:var(--cg)}
.stat-box.b{background:var(--cb)}
.stat-box.y{background:var(--cy)}
.stat-box span{display:block;font-size:22px;font-weight:700}
.stat-box small{font-size:11px;opacity:.85}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:13px;color:#555;margin-bottom:5px;font-weight:500}
input[type="text"],input[type="date"],input[type="time"],input[type="number"],textarea,select{width:100%;padding:9px 12px;border:1.5px solid #dde3ec;border-radius:8px;font-size:14px;font-family:inherit;color:#222;background:#fff;transition:border-color .2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--c)}
textarea{resize:vertical;min-height:72px}
.row{display:flex;gap:10px}
.row .form-group{flex:1}
.btn-row{display:flex;gap:10px;margin-top:16px}
.att-list{max-height:420px;overflow-y:auto}
.att-item{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #f2f2f2}
.att-item:last-child{border-bottom:none}
.att-item input{flex:1;padding:6px 10px;border:1.5px solid #dde3ec;border-radius:6px;font-size:14px}
.att-item input.ok{border-color:var(--cg);background:#f0fff4}
.att-item input.err{border-color:var(--cr);background:#fff5f5}
.att-item button{background:none;border:none;cursor:pointer;font-size:16px;padding:4px 6px;opacity:.5;transition:opacity .15s}
.att-item button:hover{opacity:1}
.att-num{font-size:12px;color:#888;margin-top:8px}
.att-dept{font-size:12px;color:var(--c);margin-top:4px}
.hist-list{max-height:500px;overflow-y:auto}
.hist-item{background:#f9fafc;border-radius:10px;padding:14px;margin-bottom:10px;border-left:3px solid var(--c)}
.hist-item.done{border-left-color:var(--cg)}
.hist-item h4{font-size:15px;margin-bottom:5px}
.hist-item p{font-size:13px;color:#555;margin:3px 0}
.hist-item .bar-bg{background:#e8edf4;border-radius:10px;height:8px;margin:8px 0;overflow:hidden}
.hist-item .bar{height:100%;background:var(--cg);border-radius:10px;transition:width .4s}
.hist-item .bar.warn{background:var(--cy)}
.hist-item .bar.danger{background:var(--cr)}
.link-row{display:flex;align-items:center;gap:6px;margin:10px 0}
.link-row input{flex:1;padding:7px 10px;border:1.5px solid #dde3ec;border-radius:6px;font-size:12px;background:#f8f9fa;color:#555}
.link-row .btn{font-size:12px;padding:7px 12px}
.qr-area{text-align:center;margin:14px 0}
.qr-area img{width:180px;height:180px;border-radius:10px;border:2px solid #eee}
.download-row{display:flex;gap:10px;justify-content:center;margin-top:10px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:16px}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:14px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:24px}
.modal h2{font-size:17px;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid #eee}
.modal-close{float:right;font-size:22px;cursor:pointer;opacity:.4;line-height:1}
.modal-close:hover{opacity:.9}
.dept-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.dept-tag{background:#eef3fb;color:var(--c);border:1.5px solid #c8d9f0;border-radius:20px;padding:5px 14px;font-size:13px;cursor:pointer;transition:all .15s}
.dept-tag:hover,.dept-tag.sel{background:var(--c);color:#fff;border-color:var(--c)}
.dept-tag.imp{background:var(--cr);color:#fff;border-color:var(--cr)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--c);color:#fff;position:sticky;top:0;z-index:100;border-radius:0 0 14px 14px}
.topbar h2{font-size:16px}
.topbar button{background:none;border:none;color:#fff;cursor:pointer;font-size:20px;opacity:.85}
.topbar button:hover{opacity:1}
.empty{text-align:center;padding:40px 20px;color:#aaa;font-size:14px}
.empty strong{display:block;font-size:16px;margin-bottom:6px;color:#ccc}
.tab-bar{display:flex;gap:2px;background:#e8ecf2;border-radius:10px;padding:3px;margin-bottom:18px}
.tab{color:var(--c);border:none;background:none;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.tab:hover{background:rgba(26,92,173,.08)}
.tab.on{background:#fff;color:var(--c);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.mt8{margin-top:8px}.mt14{margin-top:14px}
.fr{float:right;font-size:13px;color:var(--c);cursor:pointer;padding:2px 6px}
.info-box{background:#f0f7ff;border-left:3px solid var(--cb);border-radius:6px;padding:10px 14px;font-size:13px;color:var(--c);margin-bottom:14px;line-height:1.6}
.info-box.r{background:#fff5f5;border-color:var(--cr);color:var(--cr)}
.info-box.g{background:#f0fff8;border-color:var(--cg);color:var(--cg)}
#qr-wrap img{width:260px!important;height:260px!important;border-radius:6px}
#qr-wrap canvas{width:260px!important;height:260px!important;border-radius:6px}
</style>
</head>
<body>
<div class="app" id="app">
<header><h1>🏢 江南会议签到系统</h1><div class="hdr-op"><button class="btn btn-o btn-sub" id="btn-c">📋 创建会议</button></div></header>
<div id="main"></div>
</div>
<div class="modal-overlay" id="modal"><div class="modal" id="modal-body"></div></div>
<script>
(function(){
var KEY='jmt_meetings_v2';
var DEPT_LIST=['综合管理部','财务部','营销中心','技术研发中心','生产管理部','品质管理部','采购中心','资材管理部','总经办','其他'];
var SUBS=['create','history','stats'];
var curSub=SUBS[0];
var curMid=null;
var curView=null;

function genId(){
  return Date.now().toString(36)+Math.random().toString(36).slice(2,6);
}

function escHtml(s){
  if(s==null)return'';
  s=String(s);
  var d={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"};
  return s.replace(/[&<>"']/g,function(c){return d[c];});
}

function loadData(){
  try{return JSON.parse(localStorage.getItem(KEY)||'[]');}catch(e){return[];}
}
function saveData(d){localStorage.setItem(KEY,JSON.stringify(d));}

function go(sub,id){
  curSub=sub||SUBS[0];
  curMid=id||null;
  curView=null;
  render();
}

function renderMain(){
  var d=loadData();
  var total=d.length;
  var atts=0;
  for(var i=0;i<d.length;i++)atts+=d[i].att.length;
  var today=new Date().toISOString().slice(0,10);
  var tod=d.filter(function(m){return m.date===today;}).length;
  var html='';
  html+='<div class="card"><div class="stat-grid">';
  html+='<div class="stat-box"><span>'+total+'</span><small>全部会议</small></div>';
  html+='<div class="stat-box g"><span>'+tod+'</span><small>今日会议</small></div>';
  html+='<div class="stat-box b"><span>'+atts+'</span><small>签到人次</small></div>';
  html+='</div></div>';
  html+='<div class="card">';
  html+='<div class="card-title">快捷入口</div>';
  html+='<div class="btn-row"><button class="btn" onclick="go(\'create\')">+ 创建会议</button>';
  html+='<button class="btn btn-o" onclick="go(\'history\')">📋 历史记录</button>';
  html+='<button class="btn btn-b" onclick="go(\'stats\')">📊 数据统计</button></div>';
  html+='</div>';
  if(d.length>0){
    var last=d[d.length-1];
    html+='<div class="card">';
    html+='<div class="card-title">最近会议 <span class="fr" onclick="go(\'history\')">查看全部 →</span></div>';
    html+='<div class="hist-item'+(last.att.length>0?' done':'')+'">';
    html+='<h4>'+escHtml(last.name)+'</h4>';
    html+='<p>📅 '+escHtml(last.date)+' '+(last.time||'')+' | 📍 '+(last.place?escHtml(last.place):'未设地点')+'</p>';
    html+='<p>👥 已签到 '+last.att.length+(last.exp?' / '+last.exp:'')+' 人';
    if(last.exp&&last.att.length>0){
      var pct=Math.round(last.att.length/last.exp*100);
      html+=' <span style="font-size:12px;color:'+(pct>=90?'var(--cg)':pct>=60?'var(--cy)':'var(--cr)')+'">('+pct+'%)</span>';
    }
    html+='</p>';
    if(last.exp&&last.att.length>0){
      var pct2=Math.round(last.att.length/last.exp*100);
      var cls='bar'+(pct2>=90?'':pct2>=60?' warn':' danger');
      html+='<div class="bar-bg"><div class="bar '+cls+'" style="width:'+Math.min(pct2,100)+'%"></div></div>';
    }
    var link=location.origin+location.pathname+'?m='+last.id;
    html+='<div class="link-row"><input value="'+link+'" readonly><button class="btn btn-b" onclick="copyL(\''+last.id+'\')">复制</button></div>';
    html+='</div></div>';
  }
  document.getElementById('main').innerHTML=html;
}

function renderCreate(){
  var html='';
  html+='<div class="card">';
  html+='<div class="card-title">📅 创建新会议</div>';
  html+='<div class="form-group"><label>会议主题 *</label><input id="m-name" placeholder="如：2026年4月月度经营会议"></div>';
  html+='<div class="row"><div class="form-group"><label>会议日期 *</label><input type="date" id="m-date" value="'+new Date().toISOString().slice(0,10)+'"></div>';
  html+='<div class="form-group"><label>会议时间</label><input type="time" id="m-time" value="09:00"></div></div>';
  html+='<div class="form-group"><label>会议地点</label><input id="m-place" placeholder="如：二楼会议室"></div>';
  html+='<div class="form-group"><label>主持人</label><input id="m-host" placeholder="如：张三"></div>';
  html+='<div class="form-group"><label>预计人数</label><input type="number" id="m-exp" placeholder="如：30" min="1"></div>';
  html+='<div class="form-group"><label>备注</label><textarea id="m-note" placeholder="可选"></textarea></div>';
  html+='<div class="btn-row"><button class="btn btn-g" onclick="subCreate()">✅ 确认创建</button>';
  html+='<button class="btn btn-o" onclick="go(\'history\')">取消</button></div>';
  html+='</div>';
  document.getElementById('main').innerHTML=html;
}

function subCreate(){
  var name=document.getElementById('m-name').value.trim();
  var date=document.getElementById('m-date').value;
  var time=document.getElementById('m-time').value;
  var place=document.getElementById('m-place').value.trim();
  var host=document.getElementById('m-host').value.trim();
  var exp=parseInt(document.getElementById('m-exp').value,10)||0;
  var note=document.getElementById('m-note').value.trim();
  if(!name||!date){alert('请填写会议主题和日期');return;}
  var d=loadData();
  var m={id:genId(),name:name,date:date,time:time,place:place,host:host,exp:exp,note:note,att:[],created:new Date().toISOString()};
  d.push(m);
  saveData(d);
  go('meeting',m.id);
}

function renderMeeting(id){
  var d=loadData();
  var m=null;
  for(var i=0;i<d.length;i++){if(d[i].id===id){m=d[i];break;}}
  if(!m){document.getElementById('main').innerHTML='<div class="empty"><strong>会议不存在</strong><p>请返回历史记录选择有效会议</p></div>';return;}
  var link=location.origin+location.pathname+'?m='+m.id;
  var html='';
  html+='<div class="topbar"><button onclick="go(\'history\')">←</button><h2>'+escHtml(m.name)+'</h2><button onclick="go(\'export\',\''+m.id+'\')">📤</button></div>';
  html+='<div class="card">';
  html+='<div style="font-size:13px;color:#555;margin-bottom:12px">';
  html+='📅 '+escHtml(m.date)+' '+(m.time||'')+' | 📍 '+(m.place?escHtml(m.place):'未设地点');
  if(m.host)html+=' | 🎤 '+escHtml(m.host);
  html+='</div>';
  if(m.exp)html+='<div style="font-size:13px;margin-bottom:10px">👥 预计 '+m.exp+' 人 | 已签到 '+m.att.length+' 人';
  var pct2=m.exp&&m.att.length>0?Math.round(m.att.length/m.exp*100):0;
  if(m.exp&&m.att.length>0)html+=' <span style="font-size:12px;color:'+(pct2>=90?'var(--cg)':pct2>=60?'var(--cy)':'var(--cr)')+'">('+pct2+'%)</span>';
  html+='</div>';
  if(m.exp&&m.att.length>0){
    var barCls='bar'+(pct2>=90?'':pct2>=60?' warn':' danger');
    html+='<div class="bar-bg"><div class="bar '+barCls+'" style="width:'+Math.min(pct2,100)+'%"></div></div>';
  }
  html+='<div class="link-row"><input id="lnk" value="'+link+'" readonly><button class="btn btn-b" onclick="copyL(\''+m.id+'\')">复制</button></div>';
  html+='<div class="qr-area" id="qr-area"><button class="btn btn-o" onclick="showQR(\''+m.id+'\')">🔲 生成二维码</button></div>';
  html+='</div>';
  html+='<div class="card">';
  html+='<div class="card-title">✏️ 现场签到</div>';
  html+='<div class="form-group"><label>姓名 *</label><input id="s-name" placeholder="请输入姓名" onkeydown="if(event.key===\'Enter\')doSign(\''+m.id+'\')"></div>';
  html+='<div class="form-group"><label>部门</label><div class="dept-tags" id="dept-tags"></div>';
  html+='<input id="s-dept" placeholder="或手动输入部门" style="margin-top:6px"></div>';
  html+='<button class="btn btn-g" style="width:100%" onclick="doSign(\''+m.id+'\')">✅ 确认签到</button>';
  html+='</div>';
  var tagHtml='';
  for(var j=0;j<DEPT_LIST.length;j++){
    tagHtml+='<span class="dept-tag" onclick="selDept(this)">'+escHtml(DEPT_LIST[j])+'</span>';
  }
  document.getElementById('main').innerHTML=html;
  document.getElementById('dept-tags').innerHTML=tagHtml;
  renderAttList(m);
}

function selDept(el){
  document.querySelectorAll('.dept-tag').forEach(function(t){t.classList.remove('sel');});
  el.classList.add('sel');
  document.getElementById('s-dept').value=el.textContent.trim();
}

function doSign(mid){
  var name=document.getElementById('s-name').value.trim();
  var dept=document.getElementById('s-dept').value.trim();
  if(!name){alert('请输入姓名');return;}
  var d=loadData();
  var m=null;
  for(var i=0;i<d.length;i++){if(d[i].id===mid){m=d[i];break;}}
  if(!m)return;
  var existing=-1;
  for(var k=0;k<m.att.length;k++){
    if(m.att[k].name===name){existing=k;break;}
  }
  if(existing>=0){
    m.att.splice(existing,1);
  }
  m.att.push({name:name,dept:dept,time:new Date().toISOString()});
  saveData(d);
  document.getElementById('s-name').value='';
  document.getElementById('s-dept').value='';
  document.querySelectorAll('.dept-tag').forEach(function(t){t.classList.remove('sel');});
  renderAttList(m);
}

function renderAttList(m){
  var el=document.getElementById('att-list');
  if(!el)return;
  var html='';
  if(m.att.length===0){
    html='<div class="empty"><strong>暂无签到记录</strong>请等待参会人员扫码或现场签到</div>';
  }else{
    var groups={};
    for(var i=0;i<m.att.length;i++){
      var key=m.att[i].dept||'未填写部门';
      if(!groups[key])groups[key]=[];
      groups[key].push(m.att[i]);
    }
    var keys=Object.keys(groups).sort();
    for(var g=0;g<keys.length;g++){
      var k=keys[g];
      var list=groups[k];
      html+='<div style="margin-bottom:12px">';
      html+='<div style="font-size:12px;color:var(--c);font-weight:600;margin-bottom:4px">'+escHtml(k)+' ('+list.length+'人)</div>';
      for(var p=0;p<list.length;p++){
        var a=list[p];
        var t=a.time?new Date(a.time).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}):'';
        html+='<div class="att-item">';
        html+='<input class="ok" value="'+escHtml(a.name)+' '+t+'" readonly>';
        html+='<button onclick="delAtt(\''+m.id+'\',\''+escHtml(a.name)+'\')" title="删除">🗑</button>';
        html+='</div>';
      }
      html+='</div>';
    }
  }
  var countHtml='<div class="att-num">共 '+m.att.length+' 人已签到</div>';
  el.innerHTML=html+countHtml;
}

function delAtt(mid,name){
  if(!confirm('确认删除 '+name+' 的签到记录？'))return;
  var d=loadData();
  for(var i=0;i<d.length;i++){
    if(d[i].id===mid){
      for(var j=0;j<d[i].att.length;j++){
        if(d[i].att[j].name===name){d[i].att.splice(j,1);break;}
      }
      break;
    }
  }
  saveData(d);
  renderAttList(d.find(function(m){return m.id===mid;}));
}

function copyL(id){
  var d=loadData();
  var m=null;
  for(var i=0;i<d.length;i++){if(d[i].id===id){m=d[i];break;}}
  if(!m)return;
  var link=location.origin+location.pathname+'?m='+m.id;
  copyText(link);
}

function copyText(text){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){alert('已复制！');});
  }else{
    var ta=document.createElement('textarea');
    ta.value=text;
    ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);
    ta.select();
    try{document.execCommand('copy');alert('已复制！');}catch(e){alert('复制失败，请手动复制');}
    document.body.removeChild(ta);
  }
}

function showQR(id){
  var d=loadData();
  var m=null;
  for(var i=0;i<d.length;i++){if(d[i].id===id){m=d[i];break;}}
  if(!m)return;
  var link=location.origin+location.pathname+'?m='+m.id;
  var safeName=m.name.replace(/[\\/:*?"<>|]/g,'_').slice(0,20);
  var html='<div style="text-align:center">';
  html+='<div style="font-size:14px;margin-bottom:10px;color:#333;font-weight:600">'+escHtml(m.name)+'</div>';
  html+='<div id="qr-wrap" style="display:inline-block;padding:12px;background:#fff;border-radius:12px;border:2px solid #e0e6f0;margin:8px 0"></div>';
  html+='<div style="margin-top:8px;font-size:12px;color:var(--c);word-break:break-all;padding:0 10px">'+link+'</div>';
  html+='<div style="margin-top:12px"><button class="btn btn-g" id="dl-qr-btn">📥 下载二维码图片</button></div>';
  html+='<div style="margin-top:8px"><button class="btn btn-b" onclick="copyL(\''+id+'\')">📋 复制签到链接</button></div>';
  html+='</div>';
  openModal(html);
  // 生成二维码（本地渲染，成功率极高）
  var wrap=document.getElementById('qr-wrap');
  wrap.innerHTML='';
  var qr=new QRCode(wrap,{
    text:link,
    width:260,
    height:260,
    colorDark:'#000000',
    colorLight:'#ffffff',
    correctLevel:QRCode.CorrectLevel.H
  });
  // 下载按钮
  document.getElementById('dl-qr-btn').onclick=function(){
    var canvas=wrap.querySelector('canvas');
    if(canvas){
      var a=document.createElement('a');
      a.download='签到二维码_'+safeName+'_'+m.date+'.png';
      a.href=canvas.toDataURL('image/png');
      a.click();
    }else{
      alert('二维码生成中，请稍后点击下载');
    }
  };
}

function openModal(content){
  document.getElementById('modal-body').innerHTML='<span class="modal-close" onclick="closeModal()">×</span>'+content;
  document.getElementById('modal').classList.add('show');
}
function closeModal(){
  document.getElementById('modal').classList.remove('show');
}

function renderHistory(){
  var d=loadData();
  d.sort(function(a,b){return(b.created||'').localeCompare(a.created||'');});
  var html='';
  html+='<div class="card">';
  html+='<div class="card-title">📋 历史会议 <span class="fr" onclick="go(\'create\')">+ 新建</span></div>';
  if(d.length===0){
    html+='<div class="empty"><strong>暂无会议记录</strong>点击上方"创建会议"开始使用</div>';
  }else{
    for(var i=0;i<d.length;i++){
      var m=d[i];
      var pct2=m.exp&&m.att.length>0?Math.round(m.att.length/m.exp*100):0;
      var barCls=pct2>=90?'':pct2>=60?' warn':' danger';
      html+='<div class="hist-item'+(m.att.length>0?' done':'')+'">';
      html+='<h4>'+escHtml(m.name)+'</h4>';
      html+='<p>📅 '+escHtml(m.date)+' '+(m.time||'')+' | 📍 '+(m.place?escHtml(m.place):'—')+'</p>';
      html+='<p>👥 已签到 '+m.att.length+(m.exp?' / '+m.exp:'')+' 人';
      if(pct2>0)html+=' <span style="font-size:12px;color:'+(pct2>=90?'var(--cg)':pct2>=60?'var(--cy)':'var(--cr)')+'">('+pct2+'%)</span>';
      html+='</p>';
      if(m.exp&&m.att.length>0){
        html+='<div class="bar-bg"><div class="bar '+barCls+'" style="width:'+Math.min(pct2,100)+'%"></div></div>';
      }
      var link=location.origin+location.pathname+'?m='+m.id;
      html+='<div class="link-row"><input value="'+link+'" readonly><button class="btn btn-b" onclick="copyL(\''+m.id+'\')">复制</button></div>';
      html+='<div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">';
      html+='<button class="btn btn-g" style="font-size:12px;padding:6px 12px" onclick="go(\'meeting\',\''+m.id+'\')">✏️ 现场签到</button>';
      if(m.att.length>0)html+='<button class="btn btn-b" style="font-size:12px;padding:6px 12px" onclick="showQR(\''+m.id+'\')">🔲 二维码</button>';
      html+='<button class="btn btn-y" style="font-size:12px;padding:6px 12px" onclick="go(\'export\',\''+m.id+'\')">📤 导出</button>';
      html+='<button class="btn btn-r" style="font-size:12px;padding:6px 12px" onclick="delM(\''+m.id+'\')">🗑 删除</button>';
      html+='</div></div>';
    }
  }
  html+='</div>';
  document.getElementById('main').innerHTML=html;
}

function delM(id){
  if(!confirm('删除后不可恢复，确定要删除吗？'))return;
  var d=loadData();
  for(var i=0;i<d.length;i++){
    if(d[i].id===id){d.splice(i,1);break;}
  }
  saveData(d);
  go('history');
}

function renderStats(){
  var d=loadData();
  if(d.length===0){
    document.getElementById('main').innerHTML='<div class="card"><div class="empty"><strong>暂无数据</strong>创建会议后即可查看统计</div></div>';
    return;
  }
  var atts=0;
  for(var i=0;i<d.length;i++)atts+=d[i].att.length;
  var deptCount={};
  for(var i=0;i<d.length;i++){
    for(var j=0;j<d[i].att.length;j++){
      var dept=d[i].att[j].dept||'未填写';
      deptCount[dept]=(deptCount[dept]||0)+1;
    }
  }
  var sorted=Object.keys(deptCount).sort(function(a,b){return deptCount[b]-deptCount[a];});
  var max=sorted.length>0?deptCount[sorted[0]]:1;
  var html='';
  html+='<div class="card">';
  html+='<div class="stat-grid">';
  html+='<div class="stat-box"><span>'+d.length+'</span><small>会议总数</small></div>';
  html+='<div class="stat-box g"><span>'+atts+'</span><small>签到人次</small></div>';
  html+='<div class="stat-box b"><span>'+Math.round(atts/Math.max(d.length,1))+'</span><small>场均人数</small></div>';
  html+='</div></div>';
  html+='<div class="card">';
  html+='<div class="card-title">🏢 部门签到分布</div>';
  if(sorted.length===0){
    html+='<div class="empty">暂无部门数据</div>';
  }else{
    for(var k=0;k<sorted.length;k++){
      var dept=sorted[k];
      var cnt=deptCount[dept];
      var pct=Math.round(cnt/max*100);
      html+='<div style="margin-bottom:10px">';
      html+='<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">';
      html+='<span>'+escHtml(dept)+'</span><span style="color:var(--c)">'+cnt+'人</span></div>';
      html+='<div style="background:#e8edf4;border-radius:6px;height:8px">';
      html+='<div style="height:100%;background:var(--c);border-radius:6px;width:'+pct+'%"></div>';
      html+='</div></div>';
    }
  }
  html+='</div>';
  html+='<div class="card">';
  html+='<div class="card-title">📅 近期会议（最近10场）</div>';
  var recent=d.slice().sort(function(a,b){return(b.date||'').localeCompare(a.date||'');}).slice(0,10);
  for(var r=0;r<recent.length;r++){
    var m=recent[r];
    var pct2=m.exp&&m.att.length>0?Math.round(m.att.length/m.exp*100):0;
    html+='<div style="padding:10px 0;border-bottom:1px solid #f2f2f2">';
    html+='<div style="display:flex;justify-content:space-between;align-items:center">';
    html+='<div><div style="font-size:14px;font-weight:500">'+escHtml(m.name)+'</div>';
    html+='<div style="font-size:12px;color:#888">'+escHtml(m.date)+'</div></div>';
    html+='<div style="text-align:right"><div style="font-size:15px;font-weight:600;color:var(--c)">'+m.att.length+(m.exp?'/'+m.exp:'')+'</div>';
    if(pct2>0)html+='<div style="font-size:11px;color:'+(pct2>=90?'var(--cg)':pct2>=60?'var(--cy)':'var(--cr)')+'">'+pct2+'%</div>';
    html+='</div></div></div>';
  }
  html+='</div>';
  document.getElementById('main').innerHTML=html;
}

function renderExport(id){
  var d=loadData();
  var m=null;
  for(var i=0;i<d.length;i++){if(d[i].id===id){m=d[i];break;}}
  if(!m){
    document.getElementById('main').innerHTML='<div class="empty"><strong>会议不存在</strong></div>';
    return;
  }
  var link=location.origin+location.pathname+'?m='+m.id;
  var csv='\uFEFF姓名,部门,签到时间\n';
  for(var j=0;j<m.att.length;j++){
    var a=m.att[j];
    var t=a.time?new Date(a.time).toLocaleString('zh-CN'):'';
    csv+=escCsv(a.name)+','+escCsv(a.dept||'')+','+t+'\n';
  }
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var html='';
  html+='<div class="topbar"><button onclick="go(\'meeting\',\''+m.id+'\')">←</button><h2>📤 导出签到表</h2><div></div></div>';
  html+='<div class="card">';
  html+='<div class="card-title">'+escHtml(m.name)+' <span class="fr" onclick="go(\'meeting\',\''+m.id+'\')">← 返回</span></div>';
  html+='<div class="info-box"><strong>导出统计</strong><br>总签到人数：'+m.att.length+' 人<br>';
  if(m.exp)html+='预计人数：'+m.exp+' 人 | ';
  html+='出勤率：'+(m.exp&&m.att.length>0?Math.round(m.att.length/m.exp*100)+'%':'—')+'</div>';
  if(m.att.length>0){
    html+='<div style="margin-bottom:12px"><strong style="font-size:13px">签到名单预览</strong></div>';
    var groups={};
    for(var g=0;g<m.att.length;g++){
      var key=m.att[g].dept||'未填写部门';
      if(!groups[key])groups[key]=[];
      groups[key].push(m.att[g]);
    }
    var keys=Object.keys(groups).sort();
    for(var gi=0;gi<keys.length;gi++){
      html+='<div style="margin-bottom:10px">';
      html+='<div style="font-size:12px;font-weight:600;color:var(--c);margin-bottom:4px">'+escHtml(keys[gi])+' ('+groups[keys[gi]].length+'人)</div>';
      for(var pi=0;pi<groups[keys[gi]].length;pi++){
        var person=groups[keys[gi]][pi];
        var t2=person.time?new Date(person.time).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}):'';
        html+='<div style="font-size:13px;padding:4px 0;border-bottom:1px dashed #f2f2f2">';
        html+=escHtml(person.name)+' <span style="color:#888;font-size:12px">'+t2+'</span></div>';
      }
      html+='</div>';
    }
  }
  html+='<div style="margin-top:16px"><a href="'+url+'" download="签到表_'+escHtml(m.name)+'_'+m.date+'.csv" class="btn btn-g" style="display:block;text-align:center;text-decoration:none">📥 下载 CSV 文件</a></div>';
  html+='<div class="info-box g" style="margin-top:12px">';
  html+='💡 用 Excel 打开 CSV 后，如遇乱码请：<br>数据 → 分列 → 分隔符号选「逗号」→ 文件类型选「UTF-8」';
  html+='</div>';
  html+='</div>';
  document.getElementById('main').innerHTML=html;
}

function escCsv(s){
  if(s==null)return'';
  s=String(s);
  if(s.search(/[,"\n]/)>=0){
    return '"'+s.replace(/"/g,'""')+'"';
  }
  return s;
}

function spSelDept(el){
  document.querySelectorAll('#sp-dept-tags .dept-tag').forEach(function(t){t.classList.remove('sel');});
  el.classList.add('sel');
  document.getElementById('sp-dept').value=el.textContent.trim();
}

function spSign(){
  var name=document.getElementById('sp-name').value.trim();
  var dept=document.getElementById('sp-dept').value.trim();
  if(!name){alert('请输入姓名');return;}
  var d=loadData();
  var params=new URLSearchParams(location.search);
  var mid=params.get('m');
  var m=null;
  for(var i=0;i<d.length;i++){if(d[i].id===mid){m=d[i];break;}}
  if(!m)return;
  var ex=-1;
  for(var k=0;k<m.att.length;k++){
    if(m.att[k].name===name){ex=k;break;}
  }
  if(ex>=0){
    if(!confirm('您之前已完成签到。是否更新部门信息？')){
      document.getElementById('sp-name').value='';
      document.getElementById('sp-dept').value='';
      return;
    }
    m.att.splice(ex,1);
  }
  m.att.push({name:name,dept:dept,time:new Date().toISOString()});
  saveData(d);
  alert('✅ 签到成功！');
  renderSignPage(mid);
}

function render(){
  if(curSub==='stats'){renderStats();return;}
  if(curSub==='history'){renderHistory();return;}
  if(curSub==='create'){renderCreate();return;}
  if(curSub==='meeting'){renderMeeting(curMid);return;}
  if(curSub==='export'){renderExport(curMid);return;}
  renderMain();
}

window.go=go;
window.copyL=copyL;
window.showQR=showQR;
window.closeModal=closeModal;
window.selDept=selDept;
window.spSelDept=spSelDept;
window.doSign=doSign;
window.delAtt=delAtt;
window.subCreate=subCreate;
window.spSign=spSign;

function init(){
  var params=new URLSearchParams(location.search);
  var mid=params.get('m');
  if(mid){
    renderSignPage(mid);
  }else{
    render();
  }
}
init();
})();
