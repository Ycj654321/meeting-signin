<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>江南会议签到系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a3a5c 0%, #2d6a8a 50%, #1a3a5c 100%);
            min-height: 100vh; padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 2.2em; margin-bottom: 8px; }
        .header p { opacity: 0.85; }

        .panel {
            background: white; border-radius: 20px; padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25); display: none;
        }
        .panel.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 6px; color: #333; font-size: 0.95em; }
        .form-group input, .form-group select {
            width: 100%; padding: 12px 14px; border: 2px solid #e8e8e8;
            border-radius: 10px; font-size: 1em; font-family: inherit;
        }
        .form-group input:focus { outline: none; border-color: #2d6a8a; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

        .btn {
            padding: 12px 28px; border: none; border-radius: 10px;
            font-size: 1em; cursor: pointer; font-family: inherit;
            font-weight: 600; transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #2d6a8a, #1a3a5c); color: white; width: 100%;
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(45,106,138,0.4); }
        .btn-secondary { background: #f0f4f8; color: #2d6a8a; border: 1px solid #d0dce4; }
        .btn-secondary:hover { background: #e8f0f5; }
        .btn-danger { background: #fff0f0; color: #d94f4f; border: 1px solid #f5d0d0; }
        .btn-danger:hover { background: #ffe0e0; }
        .btn-sm { padding: 8px 16px; font-size: 0.85em; }

        .tab-bar {
            display: flex; gap: 6px; margin-bottom: 24px;
            background: #f0f4f8; border-radius: 14px; padding: 5px;
        }
        .tab-btn {
            flex: 1; padding: 10px; border: none; border-radius: 10px;
            font-size: 0.9em; cursor: pointer; font-weight: 600;
            background: transparent; color: #666; transition: all 0.2s;
        }
        .tab-btn.active { background: white; color: #1a3a5c; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

        .signin-card {
            background: white; border-radius: 20px; padding: 36px 30px;
            text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .signin-card .badge {
            background: linear-gradient(135deg, #2d6a8a, #1a3a5c); color: white;
            padding: 6px 18px; border-radius: 20px; font-size: 0.85em;
            font-weight: 600; display: inline-block; margin-bottom: 12px;
        }
        .signin-card h2 { color: #1a3a5c; font-size: 1.5em; margin-bottom: 6px; }
        .signin-card .meta { color: #888; font-size: 0.9em; margin-bottom: 24px; }
        .signin-card .success-msg { color: #27ae60; font-size: 1.3em; font-weight: 700; margin-bottom: 12px; display: none; }
        .signin-card.succ .success-msg { display: block; }
        .signin-card.succ .form-body { display: none; }
        .signin-card.succ .succ-detail { display: block; }
        .signin-card .succ-detail { display: none; color: #666; font-size: 0.95em; }

        .history-list { display: flex; flex-direction: column; gap: 14px; }
        .history-item {
            display: flex; align-items: flex-start; gap: 14px;
            background: #f9fafb; border: 1px solid #e8ecf0;
            border-radius: 14px; padding: 18px 20px;
        }
        .history-info { flex: 1; }
        .history-info h4 { color: #1a3a5c; font-size: 1.05em; margin-bottom: 5px; }
        .history-info p { color: #777; font-size: 0.88em; margin-bottom: 3px; }
        .history-actions { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }

        .share-box {
            background: linear-gradient(135deg, #f0f7ff, #e8f4fd);
            border: 1px solid #c0d8f0; border-radius: 12px; padding: 16px; margin-top: 12px;
        }
        .share-box .s-title { font-size: 0.88em; font-weight: 600; color: #2d6a8a; margin-bottom: 8px; }
        .share-box .url-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .share-box input {
            flex: 1; padding: 8px 12px; font-size: 0.82em;
            border: 1px solid #c0d8f0; border-radius: 8px;
            background: white; font-family: monospace; color: #555;
        }
        .share-box input:focus { outline: none; border-color: #2d6a8a; }
        .qr-center { text-align: center; }
        .qr-center img { border-radius: 10px; border: 1px solid #eee; }
        .qr-hint { font-size: 0.78em; color: #888; margin-top: 6px; }

        .empty-tip { text-align: center; color: #aaa; padding: 40px; }

        .stat-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 24px; }
        .stat-card { background: linear-gradient(135deg, #2d6a8a, #1a3a5c); color: white; border-radius: 14px; padding: 20px 16px; text-align: center; }
        .stat-card.n2 { background: linear-gradient(135deg, #27ae60, #1e8449); }
        .stat-card.n3 { background: linear-gradient(135deg, #e67e22, #d35400); }
        .stat-card .num { font-size: 2em; font-weight: 800; }
        .stat-card .lbl { font-size: 0.82em; opacity: 0.85; margin-top: 4px; }
        .bar-chart { margin-top: 16px; }
        .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .bar-label { font-size: 0.85em; color: #666; width: 80px; flex-shrink: 0; text-align: right; }
        .bar-bg { flex: 1; height: 22px; background: #f0f4f8; border-radius: 6px; overflow: hidden; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, #2d6a8a, #1a3a5c); border-radius: 6px; transition: width 0.5s; }
        .bar-fill.n2 { background: linear-gradient(90deg, #27ae60, #1e8449); }
        .bar-val { font-size: 0.82em; color: #888; width: 40px; flex-shrink: 0; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; justify-content: center; align-items: center; padding: 20px; }
        .modal.active { display: flex; animation: fadeIn 0.3s; }
        .modal-box { background: white; border-radius: 20px; padding: 30px; width: 100%; max-width: 560px; max-height: 85vh; overflow-y: auto; }
        .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-head h3 { color: #1a3a5c; }
        .modal-close { background: none; border: none; font-size: 1.5em; cursor: pointer; color: #999; }
        .att-list { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; }
        .att-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #f9fafb; border-radius: 10px; }
        .att-av { width: 36px; height: 36px; background: linear-gradient(135deg, #2d6a8a, #1a3a5c); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9em; flex-shrink: 0; }
        .att-name { font-weight: 600; color: #333; font-size: 0.95em; }
        .att-dept { font-size: 0.8em; color: #999; }
        .att-time { margin-left: auto; font-size: 0.8em; color: #aaa; flex-shrink: 0; }
        .modal-foot { display: flex; gap: 10px; margin-top: 16px; }
        .modal-foot .btn { flex: 1; padding: 10px; font-size: 0.9em; }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 24px; border-radius: 10px; font-size: 0.9em; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
        .toast.show { opacity: 1; }
        .toast.ok { background: #27ae60; }
        .toast.er { background: #e74c3c; }

        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; }
            .stat-cards { grid-template-columns: 1fr; }
            .history-item { flex-direction: column; }
            .history-actions { flex-direction: row; width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- 主面板 -->
    <div id="pnl-main" class="panel active">
        <div class="header">
            <h1>📋 江南会议签到系统</h1>
            <p>JMT · 安全生产周例会</p>
        </div>
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('signin')">📝 会议签到</button>
            <button class="tab-btn" onclick="switchTab('host')">🔧 签到管理</button>
        </div>

        <!-- 参会人员签到 -->
        <div id="tab-signin">
            <div class="signin-card" id="scard">
                <div class="badge" id="scard-badge">会议签到</div>
                <h2 id="scard-title">选择要签到的会议</h2>
                <div class="meta" id="scard-meta"></div>
                <div class="success-msg">✅ 签到成功！</div>
                <div class="form-body">
                    <select id="s-meeting" onchange="onSMeeting(this.value)" style="margin-bottom:14px;width:100%;padding:12px;border:2px solid #e0e8f0;border-radius:10px;font-size:1em;">
                        <option value="">— 请先选择会议 —</option>
                    </select>
                    <div class="form-group"><label>姓名 *</label><input id="s-name" placeholder="请输入您的姓名" maxlength="20"></div>
                    <div class="form-group"><label>部门 / 岗位</label><input id="s-dept" placeholder="如：生产部 / 品质部" maxlength="30"></div>
                    <button class="btn btn-primary" onclick="doSignin()">确认签到</button>
                </div>
                <div class="succ-detail">
                    <p id="succ-text"></p>
                    <button class="btn btn-secondary" style="margin-top:16px;" onclick="resetSc()">再签到一次</button>
                </div>
            </div>
        </div>

        <!-- 管理界面 -->
        <div id="tab-host" style="display:none;">
            <div class="tab-bar" style="margin-bottom:16px;">
                <button class="tab-btn active" onclick="switchSub('create')" id="btn-create">➕ 创建会议</button>
                <button class="tab-btn" onclick="switchSub('history')" id="btn-history">📋 历史记录</button>
                <button class="tab-btn" onclick="switchSub('stats')" id="btn-stats">📊 数据统计</button>
            </div>

            <div id="sub-create">
                <div class="form-group"><label>会议主题 *</label><input id="m-name" placeholder="如：安全生产周例会" maxlength="50"></div>
                <div class="form-row">
                    <div class="form-group"><label>会议日期 *</label><input type="date" id="m-date"></div>
                    <div class="form-group"><label>会议时间</label><input type="time" id="m-time" value="09:00"></div>
                </div>
                <div class="form-group"><label>会议地点</label><input id="m-addr" placeholder="如：大会议室 / 三楼培训室" maxlength="50"></div>
                <div class="form-row">
                    <div class="form-group"><label>主持人</label><input id="m-host" placeholder="主持人姓名" maxlength="20"></div>
                    <div class="form-group"><label>记录人</label><input id="m-rec" placeholder="记录人姓名" maxlength="20"></div>
                </div>
                <div class="form-group"><label>应到人数</label><input id="m-exp" type="number" min="0" placeholder="填写总人数（选填）"></div>
                <button class="btn btn-primary" onclick="createMeeting()">✅ 创建会议</button>
            </div>

            <div id="sub-history" style="display:none;">
                <div id="hist-list" class="history-list"></div>
            </div>

            <div id="sub-stats" style="display:none;">
                <div class="stat-cards">
                    <div class="stat-card"><div class="num" id="st-total">0</div><div class="lbl">总会议数</div></div>
                    <div class="stat-card n2"><div class="num" id="st-signed">0</div><div class="lbl">总签到人次</div></div>
                    <div class="stat-card n3"><div class="num" id="st-rate">—</div><div class="lbl">平均出勤率</div></div>
                </div>
                <div class="bar-chart" id="bar-c"></div>
            </div>
        </div>
    </div>

    <!-- 签到人独立页 -->
    <div id="pnl-page" class="panel" style="padding:0;">
        <div style="max-width:500px;margin:0 auto;">
            <div class="signin-card" id="pcard">
                <div class="badge" id="p-badge">会议签到</div>
                <h2 id="p-title" style="color:#1a3a5c;margin-bottom:6px;"></h2>
                <div id="p-meta" style="color:#888;font-size:0.9em;margin-bottom:24px;"></div>
                <div class="success-msg">✅ 签到成功！</div>
                <div class="form-body" id="p-form">
                    <div class="form-group"><label>姓名 *</label><input id="p-name" placeholder="请输入您的姓名" maxlength="20"></div>
                    <div class="form-group"><label>部门 / 岗位</label><input id="p-dept" placeholder="如：生产部 / 品质部" maxlength="30"></div>
                    <button class="btn btn-primary" onclick="doPageSignin()">确认签到</button>
                </div>
                <div class="succ-detail" id="p-succ"></div>
            </div>
        </div>
    </div>
</div>

<!-- 详情弹窗 -->
<div class="modal" id="md">
    <div class="modal-box">
        <div class="modal-head">
            <h3 id="md-title">会议详情</h3>
            <button class="modal-close" onclick="closeMd()">✕</button>
        </div>
        <div id="md-body"></div>
        <div class="modal-foot">
            <button class="btn btn-secondary" onclick="exportMd()">📥 导出CSV</button>
            <button class="btn btn-danger" onclick="delMd()">🗑 删除</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
//  数据存储
// ============================================================
var KEY = 'jmt_meetings_v2';
var gId = null; // 当前弹窗会议ID

function load() {
    var d = localStorage.getItem(KEY);
    return d ? JSON.parse(d) : [];
}
function save(d) {
    localStorage.setItem(KEY, JSON.stringify(d));
}
function genId() {
    return Date.now() + '_' + Math.random().toString(36).substr(2, 6);
}

// ============================================================
//  路由（hash）
// ============================================================
function init() {
    document.getElementById('m-date').valueAsDate = new Date();
    // 预置安全生产周例会
    var today = new Date().toISOString().split('T')[0];
    var now = new Date();
    var t = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    var d = load();
    if (!d.find(function(m){ return m.name==='安全生产周例会' && m.date===today; })) {
        d.push({id: genId(), name:'安全生产周例会', date:today, time:t, addr:'待定', host:'', rec:'', exp:0, att:[], created: new Date().toISOString()});
        save(d);
    }
    renderSelect();
    renderHist();
    route();
}
function route() {
    var h = location.hash;
    if (h.match(/^#\/(\w+)$/)) {
        var id = RegExp.$1;
        var data = load();
        var m = data.find(function(x){ return x.id===id; });
        if (m) {
            document.getElementById('pnl-main').classList.remove('active');
            document.getElementById('pnl-page').classList.add('active');
            document.getElementById('p-badge').textContent = m.date;
            document.getElementById('p-title').textContent = m.name;
            document.getElementById('p-meta').textContent = (m.time||'') + '  ' + (m.addr||'待定');
            document.getElementById('p-name').value = '';
            document.getElementById('p-dept').value = '';
            document.getElementById('pcard').classList.remove('succ');
            document.getElementById('p-succ').innerHTML = '';
            window._pageId = id;
        } else {
            location.hash = '';
        }
    } else {
        document.getElementById('pnl-page').classList.remove('active');
        document.getElementById('pnl-main').classList.add('active');
        renderSelect();
    }
}
window.addEventListener('hashchange', route);

// ============================================================
//  签到
// ============================================================
function getLink(id) {
    return location.origin + location.pathname + '#/' + id;
}

function getQrApi(url, size) {
    size = size || 180;
    return 'https://api.qrserver.com/v1/create-qr-code/?size=' + size + 'x' + size + '&margin=8&data=' + encodeURIComponent(url);
}

function doSignin() {
    var sel = document.getElementById('s-meeting');
    var id = sel.value;
    var name = document.getElementById('s-name').value.trim();
    var dept = document.getElementById('s-dept').value.trim();
    if (!id) { toast('请先选择会议', 'er'); return; }
    if (!name) { toast('请输入姓名', 'er'); return; }
    var data = load();
    var m = data.find(function(x){ return x.id===id; });
    if (!m) { toast('会议不存在', 'er'); return; }
    var already = m.att.find(function(a){ return a.name===name; });
    if (already) {
        toast('您已签到，无需重复签到', 'er');
        return;
    }
    m.att.push({name: name, dept: dept, t: new Date().toISOString()});
    save(data);
    document.getElementById('succ-text').textContent = name + ' 已签到成功！';
    document.getElementById('scard').classList.add('succ');
}

function doPageSignin() {
    if (!window._pageId) return;
    var name = document.getElementById('p-name').value.trim();
    var dept = document.getElementById('p-dept').value.trim();
    if (!name) { toast('请输入姓名', 'er'); return; }
    var data = load();
    var m = data.find(function(x){ return x.id===window._pageId; });
    if (!m) { toast('会议不存在', 'er'); return; }
    var already = m.att.find(function(a){ return a.name===name; });
    if (already) { toast('您已签到，无需重复签到', 'er'); return; }
    m.att.push({name:name, dept:dept, t: new Date().toISOString()});
    save(data);
    document.getElementById('p-succ').innerHTML = '<p style="color:#27ae60;font-weight:700;">' + name + ' 已签到成功！</p><button class="btn btn-secondary" style="margin-top:16px;" onclick="document.getElementById(\\'pcard\\').classList.remove(\\'succ\\');document.getElementById(\\'p-name\\').value=\\'\\';document.getElementById(\\'p-dept\\').value=\\'\\';">再签到一次</button>';
    document.getElementById('pcard').classList.add('succ');
}

function resetSc() {
    document.getElementById('s-name').value = '';
    document.getElementById('s-dept').value = '';
    document.getElementById('s-meeting').value = '';
    document.getElementById('scard-title').textContent = '选择要签到的会议';
    document.getElementById('scard-meta').textContent = '';
    document.getElementById('scard').classList.remove('succ');
}

function onSMeeting(id) {
    var data = load();
    var m = data.find(function(x){ return x.id===id; });
    if (m) {
        document.getElementById('scard-title').textContent = m.name;
        document.getElementById('scard-meta').textContent = (m.time||'') + '  📍 ' + (m.addr||'待定');
    }
}

// ============================================================
//  创建会议
// ============================================================
function createMeeting() {
    var name = document.getElementById('m-name').value.trim();
    var date = document.getElementById('m-date').value;
    var time = document.getElementById('m-time').value;
    var addr = document.getElementById('m-addr').value.trim();
    var host = document.getElementById('m-host').value.trim();
    var rec  = document.getElementById('m-rec').value.trim();
    var exp  = parseInt(document.getElementById('m-exp').value) || 0;
    if (!name) { toast('请填写会议主题', 'er'); return; }
    if (!date) { toast('请选择会议日期', 'er'); return; }
    var data = load();
    data.push({id: genId(), name:name, date:date, time:time, addr:addr, host:host, rec:rec, exp:exp, att:[], created: new Date().toISOString()});
    save(data);
    toast('会议创建成功！', 'ok');
    document.getElementById('m-name').value = '';
    document.getElementById('m-addr').value = '';
    document.getElementById('m-host').value = '';
    document.getElementById('m-rec').value = '';
    document.getElementById('m-exp').value = '';
    renderSelect();
    renderHist();
}

// ============================================================
//  渲染会议下拉
// ============================================================
function renderSelect() {
    var data = load();
    var sel = document.getElementById('s-meeting');
    var cur = sel.value;
    sel.innerHTML = '<option value="">— 请选择会议 —</option>' +
        data.map(function(m){
            return '<option value="'+m.id+'">'+m.name+' ('+m.date+')</option>';
        }).join('');
    if (cur && data.find(function(m){ return m.id===cur; })) sel.value = cur;
}

// ============================================================
//  历史记录
// ============================================================
function renderHist() {
    var data = load();
    var c = document.getElementById('hist-list');
    if (!data.length) { c.innerHTML='<p class="empty-tip">暂无会议记录</p>'; return; }
    // 按日期倒序
    data.slice().reverse().forEach(function(m){});
    var html = data.slice().reverse().map(function(m){
        var link = getLink(m.id);
        var qr = getQrApi(link, 160);
        return '<div class="history-item">' +
            '<div class="history-info">' +
                '<h4>'+escHtml(m.name)+'</h4>' +
                '<p>📅 '+escHtml(m.date)+' '+(m.time||'')+' &nbsp; 📍 '+escHtml(m.addr||'待定')+'</p>' +
                '<p>👥 已签到 '+m.att.length+(m.exp?'/'+m.exp:'')+' 人</p>' +
                '<div class="share-box">' +
                    '<div class="s-title">📲 微信扫码签到</div>' +
                    '<div class="qr-center"><img src="'+qr+'" alt="二维码" width="160" height="160"><div class="qr-hint">微信扫一扫 · 长按保存图片</div></div>' +
                    '<div class="s-title" style="margin-top:10px;">🔗 签到链接</div>' +
                    '<div class="url-row">' +
                        '<input id="li-'+m.id+'" value="'+link+'" onclick="this.select()" readonly>' +
                        '<button class="btn btn-secondary btn-sm" onclick="copyL(\\''+m.id+'\\')">复制</button>' +
                    '</div>' +
                '</div>' +
            '</div>' +
            '<div class="history-actions">' +
                '<button class="btn btn-primary btn-sm" onclick="showMd(\\''+m.id+'\\')">详情</button>' +
                '<button class="btn btn-danger btn-sm" onclick="delM(\\''+m.id+'\\')">删除</button>' +
            '</div>' +
        '</div>';
    }).join('');
    c.innerHTML = html;
}

function escHtml(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function copyL(id) {
    var v = document.getElementById('li-'+id).value;
    navigator.clipboard.writeText(v).then(function(){ toast('链接已复制！', 'ok'); }).catch(function(){ toast('请手动复制', 'er'); });
}

// ============================================================
//  详情弹窗
// ============================================================
function showMd(id) {
    gId = id;
    var data = load();
    var m = data.find(function(x){ return x.id===id; });
    if (!m) return;
    document.getElementById('md-title').textContent = m.name;
    var attHtml = m.att.length ? m.att.map(function(a, i){
        return '<div class="att-row">' +
            '<div class="att-av">'+escHtml(a.name.substr(0,1))+'</div>' +
            '<div><div class="att-name">'+escHtml(a.name)+'</div><div class="att-dept">'+escHtml(a.dept||'未填写部门')+'</div></div>' +
            '<div class="att-time">'+new Date(a.t).toLocaleTimeString('zh-CN')+'</div>' +
        '</div>';
    }).join('') : '<p class="empty-tip">暂无签到记录</p>';
    document.getElementById('md-body').innerHTML =
        '<p style="color:#888;margin-bottom:12px;">📅 '+escHtml(m.date)+' '+(m.time||'')+' &nbsp; 📍 '+escHtml(m.addr||'待定')+'</p>' +
        '<p style="color:#888;margin-bottom:16px;">👥 已签到 '+m.att.length+' 人'+(m.exp?'（应到'+m.exp+'人）':'')+'</p>' +
        '<div class="att-list">'+attHtml+'</div>';
    document.getElementById('md').classList.add('active');
}

function closeMd() { document.getElementById('md').classList.remove('active'); gId = null; }

function delM(id) {
    if (!confirm('确定删除该会议及所有签到记录？')) return;
    var data = load().filter(function(m){ return m.id!==id; });
    save(data);
    renderSelect();
    renderHist();
    toast('已删除', 'ok');
}

function delMd() {
    if (gId) delM(gId);
    closeMd();
}

function exportMd() {
    if (!gId) return;
    var data = load();
    var m = data.find(function(x){ return x.id===gId; });
    if (!m) return;
    var rows = [['姓名','部门','签到时间']];
    m.att.forEach(function(a){
        rows.push([a.name, a.dept||'', new Date(a.t).toLocaleString('zh-CN')]);
    });
    var csv = rows.map(function(r){ return r.map(function(c){ return '"'+(c||'').replace(/"/g,'""')+'"'; }).join(','); }).join('\n');
    var blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = '签到表_'+m.name+'_'+m.date+'.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

// ============================================================
//  统计
// ============================================================
function renderStats() {
    var data = load();
    var total = data.length;
    var signed = data.reduce(function(s,m){ return s+m.att.length; }, 0);
    var rated = data.filter(function(m){ return m.exp>0; });
    var avgRate = rated.length ? Math.round(rated.reduce(function(s,m){ return s+m.att.length/m.exp*100; }, 0) / rated.length) : 0;
    document.getElementById('st-total').textContent = total;
    document.getElementById('st-signed').textContent = signed;
    document.getElementById('st-rate').textContent = rated.length ? avgRate+'%' : '—';
    var maxAtt = Math.max.apply(null, data.map(function(m){ return m.att.length; }).concat([1]));
    var barC = document.getElementById('bar-c');
    var html = data.slice().reverse().slice(0,7).map(function(m){
        var pct = Math.round(m.att.length/maxAtt*100);
        return '<div class="bar-row"><div class="bar-label">'+escHtml(m.name.substr(0,6))+'</div><div class="bar-bg"><div class="bar-fill" style="width:'+pct+'%"></div></div><div class="bar-val">'+m.att.length+'人</div></div>';
    }).join('');
    barC.innerHTML = html;
}

// ============================================================
//  切换
// ============================================================
function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(function(b,i){ b.classList.toggle('active', i===(tab==='signin'?0:1)); });
    document.getElementById('tab-signin').style.display = tab==='signin'?'block':'none';
    document.getElementById('tab-host').style.display = tab==='host'?'block':'none';
    if (tab==='stats') renderStats();
}
function switchSub(sub) {
    var subs = ['create','history','stats'];
    subs.forEach(function(s){ document.getElementById('btn-'+s).classList.toggle('active', s===sub); });
    subs.forEach(function(s){ var el=document.getElementById('sub-'+s); if(el) el.style.display=s===sub?'block':'none'; });
    if (sub==='history') renderHist();
    if (sub==='stats') renderStats();
}

// ============================================================
//  Toast
// ============================================================
function toast(msg, cls) {
    var t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast show '+(cls||'');
    setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

// ============================================================
//  启动
// ============================================================
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
